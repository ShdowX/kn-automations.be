<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760" font-family="'Inter Tight', system-ui, sans-serif">
  <defs>
    <!-- Aurora blobs (ambient) -->
    <radialGradient id="blobAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb86b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffb86b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>

    <!-- Human figure gradient -->
    <linearGradient id="humanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- AI gradients, getting warmer/brighter at each level -->
    <radialGradient id="aiCool" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="aiMid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>
    <radialGradient id="aiWarm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb86b"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dotted grid -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arrowV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
    <marker id="arrowA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb86b"/>
    </marker>
  </defs>

  <!-- Ambient backdrop -->
  <rect width="1280" height="760" fill="url(#dots)" opacity="0.5"/>
  <ellipse cx="240" cy="450" rx="380" ry="260" fill="url(#blobIndigo)" opacity="0.5"/>
  <ellipse cx="1040" cy="450" rx="420" ry="280" fill="url(#blobAmber)" opacity="0.6"/>
  <ellipse cx="640" cy="450" rx="320" ry="220" fill="url(#blobViolet)" opacity="0.4"/>

  <!-- Eyebrow + title -->
  <text x="60" y="70" fill="#8b7fb8" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="3" font-weight="500">
    KEY INSIGHT · 07
  </text>
  <text x="60" y="125" fill="#1a1640" font-family="'Fraunces', Georgia, serif" font-weight="400" font-size="46" letter-spacing="-1.5">
    Three ways to bring AI <tspan font-style="italic" fill="#d97706">into a role.</tspan>
  </text>
  <text x="60" y="158" fill="#4a4a5e" font-size="16" font-weight="400">
    The further you go, the less the job looks like the one you started with.
  </text>

  <!-- ==================================================== -->
  <!-- THREE LEVEL PANELS -->
  <!-- Each panel: ~360px wide, centered at x = 200, 600, 1000 -->
  <!-- ==================================================== -->

  <!-- ============ LEVEL 1: PERSONAL ASSISTANT ============ -->
  <g transform="translate(70, 210)">
    <!-- Panel container -->
    <rect width="340" height="450" rx="20" fill="rgba(255,255,255,0.45)" stroke="rgba(196,181,253,0.35)" stroke-width="1"/>

    <!-- Level label -->
    <g transform="translate(28, 38)">
      <rect x="-2" y="-14" width="4" height="4" fill="#7c3aed"/>
      <text x="10" y="-8" fill="#7c3aed" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="2" font-weight="600">LEVEL 01</text>
      <text x="0" y="20" fill="#1a1640" font-family="'Fraunces', Georgia, serif" font-size="24" font-weight="400">Personal assistant</text>
      <text x="0" y="42" fill="#4a4a5e" font-size="12" font-style="italic" font-family="'Fraunces', Georgia, serif">"AI helps me do my job."</text>
    </g>

    <!-- Visual: 1 human + 1 chat bubble -->
    <g transform="translate(170, 200)">
      <!-- Human (centered) -->
      <g transform="translate(-25, -10)">
        <circle cx="25" cy="0" r="14" fill="url(#humanGrad)"/>
        <path d="M 5 38 Q 5 18 25 18 Q 45 18 45 38 L 45 60 L 5 60 Z" fill="url(#humanGrad)"/>
      </g>

      <!-- Chat bubble next to human -->
      <g transform="translate(45, -15)">
        <rect width="56" height="40" rx="12" fill="url(#aiCool)" opacity="0.95"/>
        <rect width="56" height="40" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <!-- Speech bubble tail -->
        <path d="M 8 32 L 4 42 L 18 36 Z" fill="url(#aiCool)" opacity="0.95"/>
        <!-- Three dots inside -->
        <circle cx="18" cy="20" r="2.5" fill="rgba(255,255,255,0.85)"/>
        <circle cx="28" cy="20" r="2.5" fill="rgba(255,255,255,0.85)"/>
        <circle cx="38" cy="20" r="2.5" fill="rgba(255,255,255,0.85)"/>
      </g>
    </g>

    <!-- Caption under visual -->
    <text x="170" y="290" fill="#4a4a5e" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600" text-anchor="middle">HUMAN + CHAT</text>

    <!-- Bullet list of what changes -->
    <g transform="translate(28, 320)">
      <text x="0" y="0" fill="#1a1640" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600">WHAT CHANGES</text>

      <g transform="translate(0, 22)">
        <circle cx="4" cy="4" r="2" fill="#7c3aed"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Faster mail drafts</text>
      </g>
      <g transform="translate(0, 44)">
        <circle cx="4" cy="4" r="2" fill="#7c3aed"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Quick research, summaries</text>
      </g>
      <g transform="translate(0, 66)">
        <circle cx="4" cy="4" r="2" fill="#7c3aed"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Tips and reminders</text>
      </g>
    </g>

    <!-- Role impact footer -->
    <line x1="28" y1="410" x2="312" y2="410" stroke="rgba(196,181,253,0.3)" stroke-width="1"/>
    <text x="28" y="430" fill="#7c3aed" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600">ROLE</text>
    <text x="80" y="430" fill="#4a4a5e" font-size="12" font-style="italic" font-family="'Fraunces', Georgia, serif">Same tasks — just easier.</text>
  </g>

  <!-- ============ LEVEL 2: PROCESS AI ============ -->
  <g transform="translate(440, 210)">
    <!-- Panel container -->
    <rect width="340" height="450" rx="20" fill="rgba(255,255,255,0.5)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>

    <!-- Level label -->
    <g transform="translate(28, 38)">
      <rect x="-2" y="-14" width="4" height="4" fill="#a855f7"/>
      <text x="10" y="-8" fill="#a855f7" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="2" font-weight="600">LEVEL 02</text>
      <text x="0" y="20" fill="#1a1640" font-family="'Fraunces', Georgia, serif" font-size="24" font-weight="400">Process AI</text>
      <text x="0" y="42" fill="#4a4a5e" font-size="12" font-style="italic" font-family="'Fraunces', Georgia, serif">"AI runs one of my processes."</text>
    </g>

    <!-- Visual: pipeline with AI inserted -->
    <g transform="translate(0, 160)">
      <!-- Pipeline boxes -->
      <rect x="30" y="40" width="60" height="36" rx="8" fill="rgba(71,85,105,0.7)" stroke="rgba(148,163,184,0.4)" stroke-width="1"/>
      <text x="60" y="62" fill="rgba(250,250,247,0.85)" font-size="10" font-weight="500" text-anchor="middle">Intake</text>

      <!-- AI module (replaces middle of pipeline) -->
      <g transform="translate(130, 30)" filter="url(#softGlow)">
        <rect width="80" height="56" rx="12" fill="url(#aiMid)" opacity="0.95"/>
      </g>
      <rect x="130" y="30" width="80" height="56" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="170" y="55" fill="#fafaf7" font-size="11" font-weight="500" text-anchor="middle">AI</text>
      <text x="170" y="70" fill="rgba(255,255,255,0.8)" font-family="'JetBrains Mono', monospace" font-size="7" letter-spacing="1" text-anchor="middle">service desk</text>

      <!-- Final box -->
      <rect x="250" y="40" width="60" height="36" rx="8" fill="rgba(71,85,105,0.7)" stroke="rgba(148,163,184,0.4)" stroke-width="1"/>
      <text x="280" y="62" fill="rgba(250,250,247,0.85)" font-size="10" font-weight="500" text-anchor="middle">Output</text>

      <!-- Arrows -->
      <line x1="90" y1="58" x2="128" y2="58" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowV)"/>
      <line x1="212" y1="58" x2="248" y2="58" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowV)"/>

      <!-- Human supervising from above -->
      <g transform="translate(158, -15)">
        <circle cx="12" cy="6" r="9" fill="url(#humanGrad)"/>
        <path d="M 0 30 Q 0 16 12 16 Q 24 16 24 30 L 24 38 L 0 38 Z" fill="url(#humanGrad)"/>
      </g>
      <!-- Dashed line from human to AI -->
      <line x1="170" y1="22" x2="170" y2="30" stroke="rgba(168,85,247,0.5)" stroke-width="1" stroke-dasharray="2 2"/>
    </g>

    <!-- Caption under visual -->
    <text x="170" y="290" fill="#4a4a5e" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600" text-anchor="middle">PROCESS WITH AI INSIDE</text>

    <!-- Bullet list -->
    <g transform="translate(28, 320)">
      <text x="0" y="0" fill="#1a1640" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600">WHAT CHANGES</text>

      <g transform="translate(0, 22)">
        <circle cx="4" cy="4" r="2" fill="#a855f7"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">First line handled by AI</text>
      </g>
      <g transform="translate(0, 44)">
        <circle cx="4" cy="4" r="2" fill="#a855f7"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Knowledge from ITSM tools</text>
      </g>
      <g transform="translate(0, 66)">
        <circle cx="4" cy="4" r="2" fill="#a855f7"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Human handles escalations</text>
      </g>
    </g>

    <!-- Role impact footer -->
    <line x1="28" y1="410" x2="312" y2="410" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <text x="28" y="430" fill="#a855f7" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600">ROLE</text>
    <text x="80" y="430" fill="#4a4a5e" font-size="12" font-style="italic" font-family="'Fraunces', Georgia, serif">Fewer tickets — same role.</text>
  </g>

  <!-- ============ LEVEL 3: AGENT NETWORK ============ -->
  <g transform="translate(810, 210)">
    <!-- Panel container, slightly highlighted -->
    <rect width="340" height="450" rx="20" fill="rgba(255,255,255,0.55)" stroke="rgba(217,119,6,0.5)" stroke-width="1.5"/>

    <!-- Level label -->
    <g transform="translate(28, 38)">
      <rect x="-2" y="-14" width="4" height="4" fill="#d97706"/>
      <text x="10" y="-8" fill="#d97706" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="2" font-weight="600">LEVEL 03</text>
      <text x="0" y="20" fill="#1a1640" font-family="'Fraunces', Georgia, serif" font-size="24" font-weight="400">Agent network</text>
      <text x="0" y="42" fill="#4a4a5e" font-size="12" font-style="italic" font-family="'Fraunces', Georgia, serif">"I supervise a team of agents."</text>
    </g>

    <!-- Visual: human at center, ring of agents around -->
    <g transform="translate(170, 200)">
      <!-- Faint orbits -->
      <circle r="78" fill="none" stroke="rgba(217,119,6,0.15)" stroke-width="1"/>

      <!-- Spokes -->
      <g stroke="rgba(217,119,6,0.45)" stroke-width="1" fill="none">
        <line x1="0" y1="0" x2="0" y2="-75"/>
        <line x1="0" y1="0" x2="62" y2="-37"/>
        <line x1="0" y1="0" x2="62" y2="37"/>
        <line x1="0" y1="0" x2="0" y2="75"/>
        <line x1="0" y1="0" x2="-62" y2="37"/>
        <line x1="0" y1="0" x2="-62" y2="-37"/>
      </g>

      <!-- Inter-agent connections (showing they talk to each other) -->
      <g stroke="rgba(255,184,107,0.3)" stroke-width="1" stroke-dasharray="2 3" fill="none">
        <path d="M 0 -75 Q 35 -50 62 -37"/>
        <path d="M 62 -37 Q 75 0 62 37"/>
        <path d="M 62 37 Q 35 60 0 75"/>
        <path d="M 0 75 Q -35 60 -62 37"/>
        <path d="M -62 37 Q -75 0 -62 -37"/>
        <path d="M -62 -37 Q -35 -50 0 -75"/>
      </g>

      <!-- 6 agent nodes -->
      <g>
        <circle cx="0" cy="-75" r="11" fill="url(#aiWarm)"/>
        <circle cx="0" cy="-75" r="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <text x="0" y="-71" fill="rgba(26,22,64,0.8)" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="700" text-anchor="middle">A1</text>

        <circle cx="62" cy="-37" r="11" fill="url(#aiWarm)"/>
        <circle cx="62" cy="-37" r="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <text x="62" y="-33" fill="rgba(26,22,64,0.8)" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="700" text-anchor="middle">A2</text>

        <circle cx="62" cy="37" r="11" fill="url(#aiWarm)"/>
        <circle cx="62" cy="37" r="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <text x="62" y="41" fill="rgba(26,22,64,0.8)" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="700" text-anchor="middle">A3</text>

        <circle cx="0" cy="75" r="11" fill="url(#aiWarm)"/>
        <circle cx="0" cy="75" r="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <text x="0" y="79" fill="rgba(26,22,64,0.8)" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="700" text-anchor="middle">A4</text>

        <circle cx="-62" cy="37" r="11" fill="url(#aiWarm)"/>
        <circle cx="-62" cy="37" r="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <text x="-62" y="41" fill="rgba(26,22,64,0.8)" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="700" text-anchor="middle">A5</text>

        <circle cx="-62" cy="-37" r="11" fill="url(#aiWarm)"/>
        <circle cx="-62" cy="-37" r="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <text x="-62" y="-33" fill="rgba(26,22,64,0.8)" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="700" text-anchor="middle">A6</text>
      </g>

      <!-- Human at the center, as supervisor -->
      <g filter="url(#strongGlow)">
        <circle r="22" fill="rgba(255,184,107,0.3)"/>
      </g>
      <circle r="20" fill="rgba(255,255,255,0.95)" stroke="rgba(217,119,6,0.6)" stroke-width="1.5"/>
      <!-- Human icon inside -->
      <circle cx="0" cy="-5" r="5" fill="url(#humanGrad)"/>
      <path d="M -8 12 Q -8 3 0 3 Q 8 3 8 12 L 8 15 L -8 15 Z" fill="url(#humanGrad)"/>
    </g>

    <!-- Caption under visual -->
    <text x="170" y="300" fill="#d97706" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600" text-anchor="middle">HUMAN AS SUPERVISOR</text>

    <!-- Bullet list -->
    <g transform="translate(28, 320)">
      <text x="0" y="0" fill="#1a1640" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600">WHAT CHANGES</text>

      <g transform="translate(0, 22)">
        <circle cx="4" cy="4" r="2" fill="#d97706"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Specialised agents per domain</text>
      </g>
      <g transform="translate(0, 44)">
        <circle cx="4" cy="4" r="2" fill="#d97706"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Agents coordinate autonomously</text>
      </g>
      <g transform="translate(0, 66)">
        <circle cx="4" cy="4" r="2" fill="#d97706"/>
        <text x="14" y="8" fill="#4a4a5e" font-size="12">Human designs, tunes, supervises</text>
      </g>
    </g>

    <!-- Role impact footer -->
    <line x1="28" y1="410" x2="312" y2="410" stroke="rgba(217,119,6,0.35)" stroke-width="1"/>
    <text x="28" y="430" fill="#d97706" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" font-weight="600">ROLE</text>
    <text x="80" y="430" fill="#4a4a5e" font-size="12" font-style="italic" font-family="'Fraunces', Georgia, serif">A new kind of work entirely.</text>
  </g>

  <!-- Progress arrow underneath all three panels -->
  <g transform="translate(70, 685)">
    <line x1="0" y1="0" x2="1080" y2="0" stroke="rgba(168,85,247,0.3)" stroke-width="1" stroke-dasharray="3 5"/>
    <text x="0" y="-8" fill="#7c3aed" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="2" font-weight="600">LESS AMBITIOUS</text>
    <text x="1080" y="-8" fill="#d97706" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="2" font-weight="600" text-anchor="end">MORE TRANSFORMATIVE</text>
    <!-- Arrow at the right -->
    <polygon points="1080,-4 1090,0 1080,4" fill="#d97706"/>
  </g>

  <!-- Bottom italic caption -->
  <line x1="60" y1="730" x2="120" y2="730" stroke="#d97706" stroke-width="1"/>
  <text x="135" y="734" fill="#4a4a5e" font-size="13" font-style="italic" font-family="'Fraunces', Georgia, serif">
    The further right you go, the more the human moves from doing the work to designing it.
  </text>

</svg>
