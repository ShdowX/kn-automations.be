<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reveal-generator </title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F4F1EB;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    color: #2B2620;
  }
  .wrap { width: 100%; max-width: 520px; }
  .banner {
    background: #2B2620;
    color: #F4F1EB;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
  }
  .card {
    background: #FFFFFF;
    border: 1px solid #E3DDCB;
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 14px;
  }
  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #B8923F;
    color: white;
    font-size: 12px;
    margin-right: 8px;
  }
  .dropzone {
    border: 1.5px dashed #C9BFA0;
    border-radius: 10px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .dropzone:hover { border-color: #B8923F; background: #FAF8F2; }
  .dropzone p { font-size: 13px; color: #786A50; margin-top: 8px; }
  input[type="file"] { display: none; }
  label { display: block; font-size: 13px; color: #786A50; margin-bottom: 6px; }
  input[type="date"], input[type="time"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #D9C9A0;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 14px;
    background: white;
    color: #2B2620;
  }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #8B6F35;
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
  }
  button:disabled { background: #C9BFA0; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid #C9BFA0;
    color: #2B2620;
  }
  .status {
    font-size: 13px;
    color: #786A50;
    margin-top: 10px;
    min-height: 18px;
  }
  .status.error { color: #A32D2D; }
  .status.success { color: #3B6D11; }
  .gender-pick {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .gender-pick button {
    margin-top: 0;
  }
  .detected-box {
    background: #FAF8F2;
    border: 1px solid #E3DDCB;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .download-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .share-box {
    background: #FAF8F2;
    border: 1px solid #D9C9A0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 14px;
    display: none;
  }
  .share-box label { margin-bottom: 6px; display: block; }
  .share-url-row { display: flex; gap: 8px; align-items: center; }
  .share-url-row input {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid #D9C9A0;
    border-radius: 8px;
    font-size: 12px;
    font-family: monospace;
    background: white;
    color: #2B2620;
    min-width: 0;
  }
  .share-url-row button {
    width: auto;
    padding: 9px 14px;
    margin-top: 0;
    font-size: 12px;
    flex-shrink: 0;
  }
  .doc-preview {
    background: #FAF8F2;
    border: 1px solid #E3DDCB;
    border-radius: 8px;
    padding: 16px 18px;
    margin-top: 14px;
    display: none;
  }
  .doc-preview label { margin-bottom: 10px; display: block; }
  .doc-text {
    font-size: 12px;
    color: #2B2620;
    line-height: 1.75;
    white-space: pre-wrap;
    max-height: 320px;
    overflow-y: auto;
  }
  .doc-text p { margin-bottom: 8px; }
  .doc-text p:last-child { margin-bottom: 0; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">

  <div class="banner">
    deze pagina is alleen voor degene die het geslacht mag weten .
  </div>

  <div class="card">
    <h2><span class="step-num">1</span>upload het document</h2>
    <div class="dropzone" id="dropzone">
      <div style="font-size: 24px;">📄</div>
      <p id="dropzone-text">klik om de PDF te selecteren</p>
    </div>
    <input type="file" id="file-input" accept="application/pdf" />
    <div class="status" id="upload-status"></div>
    <div class="detected-box" id="detected-box"></div>
    <div class="gender-pick hidden" id="gender-pick">
      <button id="btn-boy" class="secondary">handmatig: jongen</button>
      <button id="btn-girl" class="secondary">handmatig: meisje</button>
    </div>
  </div>

  <div class="card">
    <h2><span class="step-num">2</span>reveal-moment instellen</h2>
    <div class="row">
      <div>
        <label for="reveal-date">datum</label>
        <input type="date" id="reveal-date" />
      </div>
      <div>
        <label for="reveal-time">tijd</label>
        <input type="time" id="reveal-time" value="18:00" />
      </div>
    </div>
  </div>

  <div class="card">
    <h2><span class="step-num">3</span>link genereren</h2>
    <p style="font-size: 13px; color: #786A50; margin-bottom: 14px;">de link bevat het geslacht en het tijdstip. deel hem met iedereen die de countdown mag volgen.</p>

    <div class="detected-box" id="param-preview" style="display: block; line-height: 2; margin-bottom: 14px;">
      <div>geslacht: <strong id="param-gender" style="color: #A89B7A;">—</strong></div>
      <div>datum: <strong id="param-date" style="color: #A89B7A;">—</strong></div>
      <div>tijdstip: <strong id="param-time" style="color: #A89B7A;">—</strong></div>
    </div>

    <button id="generate-btn" disabled>vul eerst stap 1 en 2 in</button>
    <div class="status" id="generate-status"></div>
    <div class="share-box hidden" id="share-box">
      <label>deel deze link met iedereen die de countdown mag zien</label>
      <div class="share-url-row">
        <input type="text" id="share-url" readonly />
        <button id="copy-url-btn">kopieer</button>
      </div>
    </div>
    <div class="download-row hidden" id="download-row">
      <button id="preview-countdown">bekijk countdown-pagina</button>
    </div>
    <div class="doc-preview" id="doc-preview">
      <label>document zonder geslacht</label>
      <div class="doc-text" id="doc-text"></div>
    </div>
  </div>

</div>

<script>
(function() {
  var state = {
    gender: null,
    rawPdfBytes: null,
    rawPdfText: null,
    genderLineInfo: null
  };

  var dropzone = document.getElementById('dropzone');
  var fileInput = document.getElementById('file-input');
  var uploadStatus = document.getElementById('upload-status');
  var detectedBox = document.getElementById('detected-box');
  var genderPick = document.getElementById('gender-pick');
  var generateBtn = document.getElementById('generate-btn');

  dropzone.addEventListener('click', function() { fileInput.click(); });

  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    document.getElementById('dropzone-text').textContent = file.name;
    uploadStatus.textContent = 'document wordt gelezen...';
    uploadStatus.className = 'status';

    var reader = new FileReader();
    reader.onload = function() {
      state.rawPdfBytes = new Uint8Array(this.result);
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfjsLib.getDocument(state.rawPdfBytes.slice()).promise.then(function(pdf) {
        var pagePromises = [];
        for (var i = 1; i <= pdf.numPages; i++) {
          pagePromises.push(pdf.getPage(i).then(function(page) {
            return page.getTextContent().then(function(content) {
              return content.items.map(function(it) {
                return it.str + (it.hasEOL ? '\n' : ' ');
              }).join('');
            });
          }));
        }
        Promise.all(pagePromises).then(function(pageTexts) {
          var fullText = pageTexts.join('\n\n');
          state.rawPdfText = fullText;
          detectGender(fullText);
        });
      }).catch(function() {
        uploadStatus.textContent = 'kon de PDF niet lezen. Gebruik de handmatige keuze.';
        uploadStatus.className = 'status error';
        genderPick.classList.remove('hidden');
      });
    };
    reader.readAsArrayBuffer(file);
  });

  function detectGender(text) {
    var lower = text.toLowerCase();

    var boyTerms = [
      // Dutch
      'mannelijk', 'jongetje', 'broertje', 'zoontje',
      'geslacht: jongen', 'geslacht: m', 'geslacht: man',
      'geslacht:m', 'geslacht:jongen',
      'het is een jongen', 'het is een jongetje', 'het is een broertje',
      'foetus: mannelijk', 'foetus mannelijk', 'foetus:mannelijk',
      'kind: jongen', 'kind: mannelijk', 'kind:jongen',
      // English
      'male fetus', 'male foetus',
      'sex: male', 'sex:male', 'sex: m', 'sex:m',
      'gender: male', 'gender:male',
      'fetal sex: male', 'foetal sex: male',
      'it\'s a boy', 'its a boy', 'baby boy',
      // Symbol
      '♂'
    ];

    var girlTerms = [
      // Dutch
      'vrouwelijk', 'meisje', 'zusje', 'dochtertje',
      'geslacht: meisje', 'geslacht: v', 'geslacht: vrouw',
      'geslacht:v', 'geslacht:meisje',
      'het is een meisje', 'het is een zusje', 'het is een dochtertje',
      'foetus: vrouwelijk', 'foetus vrouwelijk', 'foetus:vrouwelijk',
      'kind: meisje', 'kind: vrouwelijk', 'kind:meisje',
      // English
      'female fetus', 'female foetus',
      'sex: female', 'sex:female', 'sex: f', 'sex:f',
      'gender: female', 'gender:female',
      'fetal sex: female', 'foetal sex: female',
      'it\'s a girl', 'its a girl', 'baby girl',
      // Symbol
      '♀'
    ];

    var boyScore = 0, girlScore = 0;
    boyTerms.forEach(function(t) { if (lower.indexOf(t) !== -1) boyScore++; });
    girlTerms.forEach(function(t) { if (lower.indexOf(t) !== -1) girlScore++; });

    if (boyScore === 0 && girlScore === 0) {
      uploadStatus.textContent = 'kon geen geslacht herkennen. Kies het zelf hieronder.';
      uploadStatus.className = 'status error';
      genderPick.classList.remove('hidden');
      return;
    }

    var detected = girlScore > boyScore ? 'girl' : 'boy';
    setGender(detected, true);
  }

  function setGender(g, fromDetection) {
    state.gender = g;
    uploadStatus.textContent = '';
    detectedBox.style.display = 'block';
    detectedBox.textContent = fromDetection
      ? 'document gelezen — geslacht: ' + (g === 'boy' ? 'jongen ♂' : 'meisje ♀')
      : 'handmatige keuze: ' + (g === 'boy' ? 'jongen ♂' : 'meisje ♀');
    genderPick.classList.add('hidden');
    checkReady();
  }

  document.getElementById('btn-boy').addEventListener('click', function() { setGender('boy', false); });
  document.getElementById('btn-girl').addEventListener('click', function() { setGender('girl', false); });

  document.getElementById('reveal-date').addEventListener('input', checkReady);
  document.getElementById('reveal-time').addEventListener('input', checkReady);

  function checkReady() {
    var date = document.getElementById('reveal-date').value;
    var time = document.getElementById('reveal-time').value;
    var ready = !!(state.gender && date && time);
    generateBtn.disabled = !ready;
    generateBtn.textContent = ready ? 'genereer link' : 'vul eerst stap 1 en 2 in';
    updateParamPreview();
  }

  function updateParamPreview() {
    var date = document.getElementById('reveal-date').value;
    var time = document.getElementById('reveal-time').value;
    var gEl = document.getElementById('param-gender');
    var dEl = document.getElementById('param-date');
    var tEl = document.getElementById('param-time');
    if (state.gender) {
      gEl.textContent = state.gender === 'boy' ? 'jongen ♂' : 'meisje ♀';
      gEl.style.color = state.gender === 'boy' ? '#3E6280' : '#8A3F5C';
    }
    if (date) {
      dEl.textContent = new Date(date).toLocaleDateString('nl-BE', { day: 'numeric', month: 'long', year: 'numeric' });
      dEl.style.color = '#2B2620';
    }
    if (time) {
      tEl.textContent = time + ' uur';
      tEl.style.color = '#2B2620';
    }
  }

  function cleanDocumentText(text) {
    return text
      // Dutch sex field patterns
      .replace(/geslacht\s*:\s*(jongen|meisje|man|vrouw|mannelijk|vrouwelijk)\b/gi, 'geslacht: [verborgen]')
      .replace(/geslacht\s*:\s*(m|v)\b/gi, 'geslacht: [verborgen]')
      .replace(/kind\s*:\s*(jongen|meisje|mannelijk|vrouwelijk)\b/gi, 'kind: [verborgen]')
      .replace(/foetus\s*:?\s*(mannelijk|vrouwelijk)\b/gi, 'foetus: [verborgen]')
      // Dutch standalone gender words
      .replace(/\b(mannelijk|vrouwelijk)\b/gi, '[verborgen]')
      .replace(/\b(jongetje|broertje|zoontje)\b/gi, '[verborgen]')
      .replace(/\b(zusje|dochtertje)\b/gi, '[verborgen]')
      // Dutch full phrases
      .replace(/het\s+is\s+een\s+(jongen|meisje|jongetje|zusje|broertje|dochtertje|zoontje)\b/gi, 'het is een [verborgen]')
      // English sex/gender field patterns
      .replace(/\b(male|female)\s+(fetus|foetus)\b/gi, '[verborgen] $2')
      .replace(/\bsex\s*:\s*(male|female|m|f)\b/gi, 'sex: [verborgen]')
      .replace(/\bgender\s*:\s*(male|female|m|f)\b/gi, 'gender: [verborgen]')
      .replace(/\bfo?etal\s+sex\s*:\s*(male|female|m|f)\b/gi, 'fetal sex: [verborgen]')
      // English full phrases
      .replace(/\bit[''']?s\s+a\s+(boy|girl)\b/gi, "it's a [verborgen]")
      .replace(/\bbaby\s+(boy|girl)\b/gi, 'baby [verborgen]')
      // Symbols
      .replace(/[♂♀]/g, '[verborgen]');
  }

  document.getElementById('generate-btn').addEventListener('click', function() {
    var genStatus = document.getElementById('generate-status');
    genStatus.className = 'status';
    genStatus.textContent = 'link wordt aangemaakt...';

    try {
      var date = document.getElementById('reveal-date').value;
      var time = document.getElementById('reveal-time').value;
      var payload = { g: state.gender, t: date + 'T' + time + ':00' };
      var encoded = btoa(JSON.stringify(payload));
      var shareUrl = window.location.origin + '/genderreveal/#' + encodeURIComponent(encoded);

      document.getElementById('share-url').value = shareUrl;
      document.getElementById('copy-url-btn').onclick = function() {
        navigator.clipboard.writeText(shareUrl).then(function() {
          document.getElementById('copy-url-btn').textContent = 'gekopieerd!';
          setTimeout(function() { document.getElementById('copy-url-btn').textContent = 'kopieer'; }, 2000);
        });
      };
      document.getElementById('share-box').style.display = 'block';

      document.getElementById('preview-countdown').onclick = function() {
        window.open(shareUrl, '_blank');
      };

      var cleanedDoc = state.rawPdfText ? cleanDocumentText(state.rawPdfText) : null;
      if (cleanedDoc) {
        var safe = cleanedDoc.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        document.getElementById('doc-text').innerHTML = safe
          .split(/\n{2,}/)
          .filter(function(p) { return p.trim(); })
          .map(function(p) { return '<p>' + p.replace(/\n/g, '<br>') + '</p>'; })
          .join('');
        document.getElementById('doc-preview').style.display = 'block';
      }

      genStatus.textContent = 'klaar. kopieer de link hieronder en deel hem met iedereen.';
      genStatus.className = 'status success';
      document.getElementById('download-row').classList.remove('hidden');
    } catch (err) {
      genStatus.textContent = 'er ging iets mis: ' + err.message;
      genStatus.className = 'status error';
    }
  });
})();
</script>

</body>
</html>
